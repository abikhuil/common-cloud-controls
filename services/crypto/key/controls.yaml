common_controls:
  - CCC.C01 # Prevent unencrypted requests
  - CCC.C02 # Ensure data encryption at rest all stored data
  - CCC.C03 # Implement multi-factor authentication (MFA) for access
  - CCC.C04 # Log all access and changes
  - CCC.C05 # Prevent access from untrusted entities
  - CCC.C06 # Prevent deployment in restricted regions
controls:
  - id: CCC.KeyMgmt.C01
    title: Alert when key versions are deleted or disabled
    control_family: Logging and Monitoring
    objective: |
      Ensure that alerts are generated when key versions are scheduled for deletion or disabled.
    threats:
      - CCC.KeyMgmt.TH01
    nist_csf: RS.AN-1
    control_mappings:
      NIST_800_53: 
        - IR-5
    test_requirements:
      - id: CCC.KeyMgmt.C01.TR01
        text: |
          Verify that alerts are triggered when the kms key version is scheduled for deletion.
        tlp_levels:
          - tlp_green
      - id: CCC.KeyMgmt.C01.TR02
        text: |
          Verify that alerts are triggered when the kms key version is disabled.
        tlp_levels:
          - tlp_green
      - id: CCC.KeyMgmt.C01.TR03
        text: |
          Verify that alerts are triggered when the kms key version is scheduled for deletion.
        tlp_levels:
          - tlp_amber
      - id: CCC.KeyMgmt.C01.TR04
        text: |
          Verify that alerts are triggered when the kms key version is disabled.
        tlp_levels:
          - tlp_amber
      - id: CCC.KeyMgmt.C01.TR05
        text: |
          Verify that alerts are triggered when the kms key version is scheduled for deletion.
        tlp_levels:
          - tlp_red
      - id: CCC.KeyMgmt.C01.TR06
        text: |
          Verify that alerts are triggered when the kms key version is disabled.
        tlp_levels:
          - tlp_red
      - id: CCC.KeyMgmt.C01.TR07
        text: |
          Verify that alerts are triggered when the kms key version is scheduled for deletion.
        tlp_levels:
          - tlp_clear
      - id: CCC.KeyMgmt.C01.TR08
        text: |
          Verify that alerts are triggered when the kms key version is disabled.
        tlp_levels:
          - tlp_clear
  
   - id: CCC.KeyMgmt.C02
    title: Keys must be rotated automatically
    control_family: Key Management
    objective: |
      Ensure that keys are rotated automatically to prevent unauthorized access to sensitive data.
    threats:
      - CCC.KeyMgmt.THx # Threats are not defined
    nist_csf: PR.DS-01 # The confidentiality integrity and availability of data at rest are proctected
    control_mappings:
      NIST_800_53: 
        - SC-12 # Cryptographic Key Establishment and Management
    test_requirements:
      - id: CCC.KeyMgmt.C02.TR01
        text: |
          Verify that KMS has been configured to automatically rotate encryption keys.
        tlp_levels:
          - tlp_amber


 - id: CCC.KeyMgmt.C03
    title: Alert when automatic key rotation is disabled or enabled
    control_family: Logging and Monitoring
    objective: |
      Ensure that alerts are generated when automatic key rotation is disabled.
    threats:
      - CCC.KeyMgmt.THx # Threats are not defined
    nist_csf: PR.DS-01 # The confidentiality integrity and availability of data at rest are proctected
    control_mappings:
      NIST_800_53: 
        - SC-12 # Cryptographic Key Establishment and Management
    test_requirements:
      - id: CCC.KeyMgmt.C03.TR01
        text: |
          Verify that alerts are triggered when automatic key rotation is disabled.
        tlp_levels:
          - tlp_amber
      - id: CCC.KeyMgmt.C03.TR02
        text: |
          Verify that alerts are triggered when automatic key rotation is enabled.
        tlp_levels:
          - tlp_amber

  -id: CCC.KeyMgmt.C04
    title: Disable public network access to KMS
    control_family: Network Security
    objective: |
      KMS must be configured to enforce a network guardrail within its Network settings to prevent unauthroized access
     and data exposure to the internet
    threats:
      - CCC.KeyMgmt.TH18
    nist_csf: PR.DS-1 # Data-at-rest is protected
    control_mappings:
      NIST_800_53: 
        - SC07 # Boundary Protection
    test_requirements:
      - id: CCC.KeyMgmt.C04.TR01
        text: |
          Verify that KMS is configured to enforce a network guardrail within its Network settings to prevent unauthorized access
          and data exposure to the internet
        tlp_levels:
          - tlp_amber
  
  - id: CCC.KeyMgmt.C05
      title: KMS must have deletion protection enabled
      control_family: Data Protection
      objective: |
        Ensure that KMS has deletion protection enabled to prevent accidental deletion of keys.
      threats: 
        - CCC.KeyMgmt.THx # Threats are not defined
      nist_csf: PR.DS-1 # Data-at-rest is protected
      control_mappings:
        NIST_800_53: 
          - SC-28 # Protection of Information at Rest
      test_requirements:
      - id: CCC.KeyMgmt.C05.TR01
        text: |
          Verify that KMS has deletion protection enabled to prevent accidental deletion of keys.
        tlp_levels:
          - tlp_amber